version: '3.8'

# Stack Portainer pour MindMap Book Writer
# Username GitHub: yannickmontfort-rgb
# 
# IMPORTANT: Dans Portainer, définir la variable d'environnement:
# GITHUB_USERNAME = yannickmontfort-rgb

services:
  server:
    image: ghcr.io/yannickmontfort-rgb/mindmap-book-writer-server:latest
    container_name: mindmap-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mindmap-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=Europe/Paris
    networks:
      - mindmap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/book"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    image: ghcr.io/yannickmontfort-rgb/mindmap-book-writer-client:latest
    container_name: mindmap-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - mindmap-network
    environment:
      - TZ=Europe/Paris
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mindmap-data:
    driver: local
    # Pour utiliser un dossier OMV spécifique, décommentez et modifiez :
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /srv/dev-disk-by-uuid-xxx/MindMapBooks

networks:
  mindmap-network:
    driver: bridge
